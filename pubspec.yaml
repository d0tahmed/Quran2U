name: quran_recitation
description: Open-source Quran recitation app with multiple Imams, offline support, and bookmarking.
publish_to: 'none'

version: 3.0.0+23000

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.2
  
  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # HTTP & API
  dio: ^5.3.1
  
  # Audio Playback
  just_audio: ^0.9.34
  just_audio_background: ^0.0.1-beta.17
  audio_session: ^0.1.16
  
  # Local Storage & Caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Models & Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # UI & Design
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.2
  
  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.5
  uuid: ^4.0.0
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  
  # Namaz & Qibla
  adhan: ^2.0.0      
  geolocator: ^11.0.1
  flutter_compass: ^0.8.0
  url_launcher: ^6.3.2
  flutter_appauth: ^12.0.0
  flutter_secure_storage: ^10.0.0
  http: ^1.6.0
  sqflite: ^2.4.2+1
  package_info_plus: ^9.0.1
  version: ^3.0.2
  path: ^1.9.1

  # Home Screen Widget
  home_widget: ^0.9.1
  workmanager: ^0.9.0
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  freezed: ^2.4.1
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/read_quran_bg.png
    - assets/db/

# GMS
dependency_overrides:
  geolocator_android:
    git:
      url: https://github.com/Zverik/flutter-geolocator.git
      ref: floss
      path: geolocator_android